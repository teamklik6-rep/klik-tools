<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sphere Studio · 3D генератор сфер</title>
<style>
:root{
  --background:240 10% 3.9%;
  --card:240 8% 6%;
  --panel:240 9% 8%;
  --border:240 6% 16%;
  --muted:240 5% 64%;
  --fg:0 0% 98%;
  --primary:0 0% 98%;
  --primary-2:0 0% 80%;
  --radius:.55rem;
  --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:hsl(var(--background));color:hsl(var(--fg));
  font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;
}
#checker{position:fixed;inset:0;z-index:0;display:none;
  background-color:#15151a;
  background-image:
    linear-gradient(45deg,#0c0c10 25%,transparent 25%,transparent 75%,#0c0c10 75%),
    linear-gradient(45deg,#0c0c10 25%,transparent 25%,transparent 75%,#0c0c10 75%);
  background-size:36px 36px;background-position:0 0,18px 18px}
body.transparent #checker{display:block}
#gl{position:fixed;inset:0;z-index:1;width:100vw;height:100vh;display:block;cursor:grab;touch-action:none}
#gl.drag{cursor:grabbing}

/* center overlay text */
#overlay{
  position:fixed;inset:0;z-index:2;display:none;align-items:center;justify-content:center;
  pointer-events:none;font-weight:900;letter-spacing:-.03em;line-height:.9;
  text-transform:uppercase;color:#fff;font-size:14vmin;
  text-shadow:0 0 .25em rgba(0,0,0,.35);mix-blend-mode:normal;
}

/* header */
header{
  position:fixed;top:0;left:0;z-index:5;display:flex;align-items:center;gap:.6rem;
  padding:.7rem .95rem;
}
.logo{width:26px;height:26px;border-radius:8px;
  background:hsl(var(--card));border:1px solid hsl(var(--border));flex:none}
.title{font-weight:700;font-size:.92rem;letter-spacing:-.01em}
.title small{display:block;font-weight:500;font-size:.66rem;color:hsl(var(--muted));letter-spacing:0}

/* panel */
aside{
  position:fixed;top:0;right:0;z-index:6;height:100vh;width:330px;
  background:hsl(var(--card)/.86);backdrop-filter:blur(18px) saturate(1.3);
  border-left:1px solid hsl(var(--border));
  display:flex;flex-direction:column;transition:transform .25s ease;
}
aside.hidden{transform:translateX(100%)}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.85rem .95rem .65rem;border-bottom:1px solid hsl(var(--border));
}
.panel-head h2{font-size:.82rem;font-weight:600;letter-spacing:.02em}
.panel-head .hint{font-size:.62rem;color:hsl(var(--muted));margin-top:.2rem;font-family:var(--mono)}
.panel-body{overflow-y:auto;flex:1;padding:.4rem .15rem 4rem}
.panel-body::-webkit-scrollbar{width:9px}
.panel-body::-webkit-scrollbar-thumb{background:hsl(var(--border));border-radius:9px;border:2px solid transparent;background-clip:padding-box}

.section{border-bottom:1px solid hsl(var(--border)/.6)}
.sec-head{
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  padding:.6rem .95rem;font-size:.72rem;font-weight:600;letter-spacing:.04em;
  text-transform:uppercase;color:hsl(var(--fg)/.82);user-select:none;
}
.sec-head .chev{transition:transform .2s;color:hsl(var(--muted));font-size:.7rem}
.sec-head.closed .chev{transform:rotate(-90deg)}
.sec-body{padding:.2rem .95rem .75rem}

.row{display:flex;align-items:center;gap:.6rem;padding:.28rem 0;min-height:30px}
.row label{flex:1;font-size:.74rem;color:hsl(var(--fg)/.85)}
.row input[type=range]{flex:1.3;-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;
  background:hsl(var(--border));outline:none}
.row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
  background:hsl(var(--fg));cursor:pointer;box-shadow:0 0 0 3px hsl(var(--card))}
.row .val{width:42px;text-align:right;font-family:var(--mono);font-size:.68rem;color:hsl(var(--muted))}
.row input[type=color]{width:34px;height:24px;padding:0;border:1px solid hsl(var(--border));
  border-radius:6px;background:transparent;cursor:pointer}
.row input[type=text]{flex:1.3;background:hsl(var(--panel));border:1px solid hsl(var(--border));
  border-radius:6px;color:hsl(var(--fg));font-size:.74rem;padding:.3rem .5rem;outline:none}
.row select{flex:1.3;background:hsl(var(--panel));border:1px solid hsl(var(--border));
  border-radius:6px;color:hsl(var(--fg));font-size:.74rem;padding:.32rem .4rem;outline:none}

/* switch */
.sw{position:relative;width:38px;height:21px;flex:none}
.sw input{opacity:0;width:0;height:0}
.sw span{position:absolute;inset:0;background:hsl(var(--border));border-radius:99px;transition:.18s;cursor:pointer}
.sw span:before{content:"";position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.18s}
.sw input:checked+span{background:hsl(var(--primary))}
.sw input:checked+span:before{transform:translateX(17px);background:#101014}

.btn{
  display:flex;align-items:center;justify-content:center;gap:.4rem;width:100%;
  padding:.55rem;border:1px solid hsl(var(--border));border-radius:var(--radius);
  background:hsl(var(--panel));color:hsl(var(--fg));font-size:.76rem;font-weight:600;
  cursor:pointer;transition:.15s;font-family:var(--sans)
}
.btn:hover{background:hsl(var(--border))}
.btn.primary{background:hsl(var(--primary));border:none;color:#0b0b0f;font-weight:650}
.btn.primary:hover{filter:brightness(0.88)}
.btn.rec.on{background:#e11d48;border:none;color:#fff;animation:pulse 1.2s infinite}
@keyframes pulse{50%{filter:brightness(1.25)}}
.btn-row{display:flex;gap:.5rem;margin:.45rem 0}
.btn-row .btn{margin:0}
.rec-time{font-family:var(--mono);font-size:.68rem;color:hsl(var(--muted));text-align:center;margin-top:.25rem;min-height:1em}

.iconbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border:1px solid hsl(var(--border));border-radius:8px;background:hsl(var(--panel));cursor:pointer;color:hsl(var(--fg))}
.iconbtn:hover{background:hsl(var(--border))}

#showPanel{position:fixed;top:.7rem;right:.7rem;z-index:7;display:none}

#err{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;
  background:#000;color:#f87171;font-family:var(--mono);font-size:.85rem;padding:2rem;text-align:center}
svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<div id="checker"></div>
<canvas id="gl"></canvas>
<div id="overlay">RUN</div>

<header>
  <div class="logo"></div>
  <div class="title">Sphere Studio
    <small>3D генератор світлових сфер</small>
  </div>
</header>

<button id="showPanel" class="iconbtn" title="Показати панель (H)">
  <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
</button>

<aside id="panel">
  <div class="panel-head">
    <div>
      <h2>Налаштування</h2>
      <div class="hint">ЛКМ — обертати · колесо — зум · H — панель</div>
    </div>
    <button id="hidePanel" class="iconbtn" title="Сховати (H)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="panel-body" id="body"></div>
</aside>

<div id="err"></div>

  vec2 d=gl_PointCoord-0.5; float r=length(d);
  if(r>0.5) discard;
  float a=smoothstep(0.5,0.0,r)*mix(0.20,1.0,vDim);
  o=vec4(uPColor*uPGlow, a);                    // additive color, normal alpha (see blendFuncSeparate)
}`;

function compile(type,src){
  const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ showErr('Shader:\n'+gl.getShaderInfoLog(s)); throw 0; }
  return s;
}
function createProgram(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,compile(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,compile(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){ showErr('Link:\n'+gl.getProgramInfoLog(p)); throw 0; }
  return p;
}
const prog=createProgram(VERT,FRAG);
const vaoMain=gl.createVertexArray();
gl.useProgram(prog); gl.bindVertexArray(vaoMain);

const _u={};
function U(n){ if(!(n in _u)) _u[n]=gl.getUniformLocation(prog,n); return _u[n]; }

// particle program + buffers
const progP=createProgram(VERT_PTS,FRAG_PTS);
const _up={}; function UP(n){ if(!(n in _up)) _up[n]=gl.getUniformLocation(progP,n); return _up[n]; }
const locU=gl.getAttribLocation(progP,'aU'), locV=gl.getAttribLocation(progP,'aV'), locM=gl.getAttribLocation(progP,'aMeta');
const ptVao=gl.createVertexArray();
const bufU=gl.createBuffer(), bufV=gl.createBuffer(), bufM=gl.createBuffer();
let ptN=0;
function setAttr(buf,loc,data){
  gl.bindBuffer(gl.ARRAY_BUFFER,buf); gl.bufferData(gl.ARRAY_BUFFER,data,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,3,gl.FLOAT,false,0,0);
}
function genParticles(){
  const n=P.particleCount|0; ptN=n;
  if(n<=0) return;
  const Ua=new Float32Array(n*3),Va=new Float32Array(n*3),Ma=new Float32Array(n*3);
  const incl=P.particleIncl;
  for(let i=0;i<n;i++){
    // random orbit-plane normal, blended from equatorial (+Y) toward fully random by inclination
    let rx=Math.random()*2-1, ry=Math.random()*2-1, rz=Math.random()*2-1;
    const rl=Math.hypot(rx,ry,rz)||1; rx/=rl; ry/=rl; rz/=rl;
    let Nx=rx*incl, Ny=(1-incl)+ry*incl, Nz=rz*incl;
    const Nl=Math.hypot(Nx,Ny,Nz)||1; Nx/=Nl; Ny/=Nl; Nz/=Nl;
    // basis u,v spanning the orbit plane
    let ax=0,ay=0,az=1; if(Math.abs(Nz)>0.9){ ax=1; az=0; }
    let ux=Ny*az-Nz*ay, uy=Nz*ax-Nx*az, uz=Nx*ay-Ny*ax;
    const ul=Math.hypot(ux,uy,uz)||1; ux/=ul; uy/=ul; uz/=ul;
    const vx=Ny*uz-Nz*uy, vy=Nz*ux-Nx*uz, vz=Nx*uy-Ny*ux;
    Ua[i*3]=ux; Ua[i*3+1]=uy; Ua[i*3+2]=uz;
    Va[i*3]=vx; Va[i*3+1]=vy; Va[i*3+2]=vz;
    Ma[i*3]=Math.random()*2-1;             // radius variation
    Ma[i*3+1]=Math.random()*6.2831853;     // phase
    Ma[i*3+2]=0.6+Math.random()*0.8;       // speed factor
  }
  gl.bindVertexArray(ptVao);
  setAttr(bufU,locU,Ua); setAttr(bufV,locV,Va); setAttr(bufM,locM,Ma);
  gl.bindVertexArray(vaoMain);
}

/* ============================== STATE ============================== */
let angX=0, angY=0, time=0, lastT=performance.now();
let baseCenters=[], radScale=[];
const centersBuf=new Float32Array(24), radiiBuf=new Float32Array(8);
const cCore=new Float32Array(3),cMid=new Float32Array(3),cRim=new Float32Array(3),cBg=new Float32Array(3),pColor=new Float32Array(3);

function hexLin(hex,out){
  const h=hex.replace('#','');
  const r=parseInt(h.substr(0,2),16)/255, g=parseInt(h.substr(2,2),16)/255, b=parseInt(h.substr(4,2),16)/255;
  out[0]=Math.pow(r,2.2); out[1]=Math.pow(g,2.2); out[2]=Math.pow(b,2.2); return out;
}
function hexDisp(hex,out){
  const h=hex.replace('#','');
  out[0]=parseInt(h.substr(0,2),16)/255; out[1]=parseInt(h.substr(2,2),16)/255; out[2]=parseInt(h.substr(4,2),16)/255; return out;
}
function rotMat(ax,ay){
  const cx=Math.cos(ax),sx=Math.sin(ax),cy=Math.cos(ay),sy=Math.sin(ay);
  // column-major of Ry(ay)*Rx(ax)
  return new Float32Array([ cy,0,-sy,  sy*sx,cx,cy*sx,  sy*cx,-sx,cy*cx ]);
}

function genSpheres(){
  const n=P.count|0; baseCenters=[]; radScale=[];
  for(let i=0;i<n;i++){
    if(n===1){ baseCenters.push([0,0,0]); radScale.push(1); continue; }
    const r=P.spread*Math.cbrt(Math.random());
    const th=Math.random()*6.2831853, ph=Math.acos(2*Math.random()-1);
    baseCenters.push([r*Math.sin(ph)*Math.cos(th), r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph)]);
    radScale.push(0.45+Math.random()*0.7);
  }
}
function sync(){
  hexLin(P.core,cCore); hexLin(P.mid,cMid); hexLin(P.rim,cRim); hexLin(P.bg,cBg);
  hexDisp(P.particleColor,pColor);
  const ov=document.getElementById('overlay');
  ov.style.display=P.showText?'flex':'none';
  ov.textContent=P.text; ov.style.color=P.textColor; ov.style.fontSize=P.textSize+'vmin';
  document.body.classList.toggle('transparent',P.transparentBg);
  if(typeof recBtn!=='undefined' && !rec) recBtn.textContent=recLabel();
  schedulePersist();
}
function resize(){
  const w=Math.round(window.innerWidth*P.pixelRatio), h=Math.round(window.innerHeight*P.pixelRatio);
  canvas.width=w-(w%2); canvas.height=h-(h%2);
  canvas.style.width=window.innerWidth+'px'; canvas.style.height=window.innerHeight+'px';
}

function draw(){
  const n=P.count|0;
  for(let i=0;i<n;i++){
    centersBuf[i*3]=baseCenters[i][0]; centersBuf[i*3+1]=baseCenters[i][1]; centersBuf[i*3+2]=baseCenters[i][2];
    radiiBuf[i]=radScale[i]*P.radius;
  }
  const R=rotMat(angX,angY);
  gl.useProgram(prog); gl.bindVertexArray(vaoMain); gl.disable(gl.BLEND);
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.uniform2f(U('uRes'),canvas.width,canvas.height);
  gl.uniform1f(U('uTime'),time);
  gl.uniform1f(U('uFocal'),P.focal);
  gl.uniform1f(U('uCamDist'),P.camDist);
  gl.uniform1f(U('uAlphaMode'),P.transparentBg?1:0);
  gl.uniformMatrix3fv(U('uRot'),false,R);
  gl.uniform1i(U('uCount'),n);
  gl.uniform1i(U('uOctaves'),P.octaves|0);
  gl.uniform1i(U('uSteps'),P.steps|0);
  gl.uniform3fv(U('uCenters[0]'),centersBuf.subarray(0,n*3));
  gl.uniform1fv(U('uRadii[0]'),radiiBuf.subarray(0,n));
  gl.uniform3fv(U('uCore'),cCore); gl.uniform3fv(U('uMid'),cMid);
  gl.uniform3fv(U('uRim'),cRim); gl.uniform3fv(U('uBg'),cBg);
  gl.uniform1f(U('uNoiseScale'),P.noiseScale); gl.uniform1f(U('uNoiseSpeed'),P.noiseSpeed);
  gl.uniform1f(U('uDisplace'),P.displace); gl.uniform1f(U('uFresnel'),P.fresnel);
  gl.uniform1f(U('uRimBoost'),P.rimBoost); gl.uniform1f(U('uGlow'),P.glow);
  gl.uniform1f(U('uGlowSharp'),P.glowSharp); gl.uniform1f(U('uIntensity'),P.intensity);
  gl.uniform1f(U('uExposure'),P.exposure); gl.uniform1f(U('uGradSharp'),P.gradSharp);
  gl.uniform1f(U('uPulse'),P.pulse); gl.uniform1f(U('uPulseSpeed'),P.pulseSpeed);
  gl.drawArrays(gl.TRIANGLES,0,3);

  // orbit dots — additive glow on top of the sphere
  if(P.showParticles && ptN>0){
    gl.useProgram(progP); gl.bindVertexArray(ptVao);
    gl.uniform1f(UP('uTime'),time);
    gl.uniform1f(UP('uSphereR'),P.radius);
    gl.uniform1f(UP('uOrbitMul'),P.particleOrbit);
    gl.uniform1f(UP('uSpread'),P.particleSpread);
    gl.uniform1f(UP('uPSpeed'),P.particleSpeed);
    gl.uniform1f(UP('uCamDist'),P.camDist);
    gl.uniform1f(UP('uFocal'),P.focal);
    gl.uniform1f(UP('uPSize'),P.particleSize*P.pixelRatio);
    gl.uniform2f(UP('uRes'),canvas.width,canvas.height);
    gl.uniformMatrix3fv(UP('uRot'),false,R);
    gl.uniform3fv(UP('uPColor'),pColor);
    gl.uniform1f(UP('uPGlow'),P.particleGlow);
    gl.enable(gl.BLEND);
    gl.blendFuncSeparate(gl.SRC_ALPHA,gl.ONE,gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
    gl.drawArrays(gl.POINTS,0,ptN);
    gl.disable(gl.BLEND);
  }
}

function stepAnim(){
  const now=performance.now(); const dt=Math.min((now-lastT)/1000,0.05); lastT=now;
  time+=dt; angX+=P.rotX*dt; angY+=P.rotY*dt;
  draw();
}
function loop(){
  if(!rec) stepAnim();          // while recording, the rec timer advances + draws (survives tab switches)
  requestAnimationFrame(loop);
}

function hslHex(h,s,l){
  s/=100; l/=100; const k=n=>(n+h/30)%12; const a=s*Math.min(l,1-l);
  const f=n=>{ const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return Math.round(255*c); };
  const x=v=>v.toString(16).padStart(2,'0'); return '#'+x(f(0))+x(f(8))+x(f(4));
}

  const w=recCanvas.width, h=recCanvas.height;
  recCtx.drawImage(canvas,0,0,w,h);                    // seed first frame
  // transparent video needs an alpha codec — H.264/MP4 can't carry alpha, so use WebM (VP9/VP8)
  if(P.transparentBg){ startMediaRec(true); return; }
  // real MP4 via WebCodecs + mp4-muxer — deterministic, works in Chrome AND Safari
  if(window.VideoEncoder && window.Mp4Muxer){
    let codec=null;
    for(const c of ['avc1.640034','avc1.640033','avc1.4d0033','avc1.4d0028','avc1.640028','avc1.42001f','avc1.42e01f']){
      try{ const r=await VideoEncoder.isConfigSupported({codec:c,width:w,height:h,bitrate:P.recBitrate*1e6}); if(r.supported){codec=c;break;} }catch(e){}
    }
    if(codec){
      const muxer=new Mp4Muxer.Muxer({target:new Mp4Muxer.ArrayBufferTarget(),video:{codec:'avc',width:w,height:h},fastStart:'in-memory'});
      let gotConfig=false, addErr=null;
      const encoder=new VideoEncoder({output:(ch,meta)=>{
        if(meta&&meta.decoderConfig) gotConfig=true;
        try{
          // use the raw API so we can supply a valid duration — Safari leaves chunk.duration null,
          // which mp4-muxer's addVideoChunk() rejects ("duration must be a non-negative real number")
          const data=new Uint8Array(ch.byteLength); ch.copyTo(data);
          const dur=(typeof ch.duration==='number'&&ch.duration>=0)?ch.duration:Math.round(1e6/Math.max(1,P.recFps));
          muxer.addVideoChunkRaw(data, ch.type, ch.timestamp, dur, meta);
        }catch(e){ addErr=addErr||e.message; }
      },error:e=>{ showErr('Encoder: '+e.message); }});
      encoder.configure({codec,width:w,height:h,bitrate:P.recBitrate*1e6,framerate:P.recFps});
      rec={mode:'mp4',encoder,muxer,w,h,startMs:performance.now(),frames:0,hasConfig:()=>gotConfig,addErr:()=>addErr};
      setRecUI(true); startRecTimer();
      if(P.recSeconds>0) rec.autoStop=setTimeout(stopRec,P.recSeconds*1000);
      return;
    }
  }
  startMediaRec(false);
}
// recording is driven by a timer (not rAF) so it keeps running even if the tab is hidden
function recTick(){
  if(!rec) return;
  stepAnim();                                                      // advance + render a fresh frame
  recCtx.drawImage(canvas,0,0,recCanvas.width,recCanvas.height);   // downscale into the capture canvas
  if(rec.mode==='mp4' && rec.encoder.encodeQueueSize<6){
    if(rec.t0==null) rec.t0=performance.now();                    // first encoded frame defines t=0
    const ts=Math.max(0,Math.round((performance.now()-rec.t0)*1000));  // muxer requires first DTS === 0
    const frame=new VideoFrame(recCanvas,{timestamp:ts,duration:Math.max(1,Math.round(1e6/Math.max(1,P.recFps)))});
    rec.encoder.encode(frame,{keyFrame: rec.frames%(Math.max(1,P.recFps)*2)===0});
    frame.close(); rec.frames++;
  }
  updateRecTime();
}
function startRecTimer(){ rec.timer=setInterval(recTick, Math.max(16,Math.round(1000/Math.max(1,P.recFps)))); }
function startMediaRec(wantAlpha){
  if(!window.MediaRecorder){ showErr('MediaRecorder недоступний у цьому браузері.'); return; }
  const stream=recCanvas.captureStream(P.recFps);
  const types = wantAlpha
    ? ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']   // alpha-capable
    : ['video/mp4;codecs=avc1','video/webm;codecs=vp9','video/webm'];
  const mime=types.find(t=>MediaRecorder.isTypeSupported(t))||'';
  if(wantAlpha && !mime.includes('webm')) showErr('Цей браузер не вміє писати прозоре відео (WebM/VP9). Спробуй Chrome, або зніми «Прозорий фон».');
  const mr=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:P.recBitrate*1e6});
  const chunks=[];
  mr.ondataavailable=e=>{ if(e.data.size) chunks.push(e.data); };
  mr.onstop=()=>{
    const ext=mime.includes('mp4')?'mp4':'webm';
    if(!chunks.length){ showErr('Запис вийшов порожнім. Спробуй ще раз або меншу роздільність.'); return; }
    download(URL.createObjectURL(new Blob(chunks,{type:mime})),'sphere-studio.'+ext);
  };
  mr.start(250);                                       // timeslice → data flushes periodically (Safari needs this)
  rec={mode:'media',mediaRec:mr,startMs:performance.now(),container:mime.includes('mp4')?'MP4':(P.transparentBg?'WebM α':'WebM')};
  setRecUI(true); startRecTimer();
  if(P.recSeconds>0) rec.autoStop=setTimeout(stopRec,P.recSeconds*1000);
}
async function stopRec(){
  if(!rec) return; const r=rec; rec=null; setRecUI(false);
  if(r.timer) clearInterval(r.timer);
  if(r.autoStop) clearTimeout(r.autoStop);
  recTime.textContent='';
  if(r.mode==='mp4'){
    recBtn.textContent='⏳ Збереження…';
    // flush, but never hang the UI if the encoder stalls — save whatever we have
    try{ await Promise.race([r.encoder.flush(), new Promise((_,rej)=>setTimeout(()=>rej(new Error('flush timeout')),8000))]); }catch(e){}
    try{ r.encoder.close(); }catch(e){}
    // muxer.finalize() crashes if no chunk carried a decoderConfig — bail cleanly instead
    if(r.hasConfig && !r.hasConfig()){
      showErr('Кодек не повернув конфігурацію — відео не збережено. Спробуй ще раз.');
      recBtn.textContent=recLabel(); return;
    }
    if(r.addErr && r.addErr()){
      showErr('Muxer addVideoChunk: '+r.addErr());
      recBtn.textContent=recLabel(); return;
    }
    try{
      r.muxer.finalize();
      const buf=r.muxer.target.buffer;
      if(buf && buf.byteLength>0) download(URL.createObjectURL(new Blob([buf],{type:'video/mp4'})),'sphere-studio.mp4');
      else showErr('Енкодер не видав кадрів. Спробуй ще раз або іншу роздільність.');
    }catch(e){ showErr('Не вдалося зберегти MP4: '+e.message); }
    recBtn.textContent=recLabel();
  } else { try{ r.mediaRec.requestData(); }catch(e){} r.mediaRec.stop(); }
}
function recLabel(){ return P.transparentBg ? '● Записати WebM (alpha)' : '● Записати MP4'; }
function setRecUI(on){
  recBtn.classList.toggle('on',on);
  recBtn.textContent=on?'■ Стоп':recLabel();
}
function updateRecTime(){
  if(!rec) return;
  const sec=(performance.now()-rec.startMs)/1000;
  const tag=rec.mode==='mp4'?'MP4':(rec.container||'WebM');
  recTime.textContent='● REC '+sec.toFixed(1)+'s · '+tag;
}

/* ============================== INTERACTION ============================== */
let dragging=false,lx=0,ly=0;
canvas.addEventListener('pointerdown',e=>{ dragging=true; lx=e.clientX; ly=e.clientY; canvas.classList.add('drag'); canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener('pointermove',e=>{ if(!dragging)return; angY+=(e.clientX-lx)/220; angX+=(e.clientY-ly)/220; lx=e.clientX; ly=e.clientY; });
canvas.addEventListener('pointerup',()=>{ dragging=false; canvas.classList.remove('drag'); });
canvas.addEventListener('wheel',e=>{ e.preventDefault(); P.camDist=Math.min(12,Math.max(2,P.camDist*(1+e.deltaY*0.0011))); reg.camDist&&reg.camDist(); },{passive:false});

const panel=document.getElementById('panel'), showBtn=document.getElementById('showPanel');
function togglePanel(){ const h=panel.classList.toggle('hidden'); showBtn.style.display=h?'flex':'none'; }
document.getElementById('hidePanel').onclick=togglePanel;
showBtn.onclick=togglePanel;
window.addEventListener('keydown',e=>{ if(e.key==='h'||e.key==='H') togglePanel(); });
window.addEventListener('resize',reflow);

function showErr(msg){ const e=document.getElementById('err'); e.style.display='flex'; e.textContent=msg; console.error(msg); }

/* ============================== BOOT ============================== */
genSpheres(); genParticles(); resize(); sync(); refreshUI();
requestAnimationFrame(loop);
})();
</script>
<script src="i18n.js"></script>
</body>
